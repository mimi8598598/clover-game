<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Tycoon Ultimate</title>
    <style>
        :root { --gold: #ffd700; --green: #00ff88; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; overflow: hidden; }
        .screen.on { display: block; }

        #game-view.on { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #val { font-size: 50px; color: var(--gold); font-weight: bold; text-shadow: 0 0 20px rgba(255,215,0,0.4); z-index: 10; }
        
        /* АНИМАЦИЯ ПАДЕНИЯ КЛЕВЕРА */
        .clover { 
            position: absolute; 
            font-size: 40px; 
            cursor: pointer; 
            z-index: 5; 
            user-select: none;
            animation: fall 3s linear forwards; /* Клевер падает 3 секунды */
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align:center; padding: 18px 5px; cursor: pointer; color: #666; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--gold); background: #1a1a1a; }

        /* ИСПРАВЛЕННОЕ УВЕДОМЛЕНИЕ */
        #global-msg {
            display: none;
            position: fixed;
            top: 20px; /* Сместил выше, чтобы не закрывало заголовок */
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            min-width: 200px;
        }

        .admin-icon {
            width: 35px;
            height: 35px;
            vertical-align: middle;
            margin-right: 10px;
            border-radius: 50%;
            object-fit: cover;
            background: #fff; /* Белый фон, если картинка грузится */
        }
    </style>
</head>
<body>

    <div id="global-msg">
        <div id="msg-content" style="display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <div id="game-view" class="screen on">
        <div style="text-align:center; pointer-events: none;">
            <div id="val">0</div>
            <p style="color:#888; margin-top: 5px; letter-spacing: 2px;">CLOVERS</p>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <h2 style="color:var(--green); text-align:center;">🛠 МАГАЗИН</h2>
        <div class="card">
            <b>🎭 Маска Анонима</b> <br><small>Скрывает твой баланс в ТОПе</small>
            <button class="btn" style="margin-top:15px;" onclick="showGlobal('Функция в разработке!')">50,000 🍀</button>
        </div>
    </div>

    <div id="scr-set" class="screen">
        <h2 style="text-align:center; color:var(--gold);">⚙️ НАСТРОЙКИ</h2>
        <div class="card">
            <p style="margin-top:0; font-weight: bold;">Админ-команды:</p>
            <input type="text" id="find" class="input-box" placeholder="Введи /команду...">
            <button class="btn" onclick="applyCode()">выполнить</button>
        </div>
        <button class="btn" style="background: #cc0000; color: white;" onclick="applyCode('/reset')">ПОЛНЫЙ СБРОС ИГРЫ</button>
    </div>

    <div id="nav">
        <div class="nav-item active" onclick="tab('game-view', this)">🎮 ИГРА</div>
        <div class="nav-item" onclick="tab('scr-shop', this)">🛠 ШОП</div>
        <div class="nav-item" onclick="tab('scr-set', this)">⚙️ НАСТР.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;

        // ИСПОЛЬЗУЕМ ПРЯМУЮ ССЫЛКУ НА КАРТИНКУ
        const adminImgHtml = `<img src="https://i.ibb.co/Xf8Y8mK/image-94.png" class="admin-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995531.png'">`;

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById(id).classList.add('on');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // ПАДАЮЩИЕ КЛЕВЕРЫ
        function spawn() {
            if (!document.getElementById('game-view').classList.contains('on')) return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerText = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            
            c.onclick = function() {
                score += 100;
                refresh();
                this.remove();
            };
            document.getElementById('game-view').appendChild(c);
            
            // Удаляем клевер, когда он упал за экран
            setTimeout(() => { if(c.parentNode) c.remove(); }, 3000);
        }

        function showGlobal(text) {
            const el = document.getElementById('global-msg');
            const content = document.getElementById('msg-content');
            content.innerHTML = adminImgHtml + `<span>${text}</span>`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function applyCode(forcedCmd = null) {
            let input = document.getElementById('find');
            let v = forcedCmd || input.value.trim();
            if (!v.startsWith('/')) return;
            
            let args = v.split(' ');
            let cmd = args[0].toLowerCase();

            if (cmd === '/6633') {
                score += 5000000;
                showGlobal("👑 АДМИН-ДОСТУП: +5M");
            } 
            else if (cmd === '/money') {
                let amt = parseInt(args[1]) || 10000;
                score += amt;
                showGlobal("💰 Выдано: " + amt.toLocaleString());
            }
            else if (cmd === '/global') {
                showGlobal(args.slice(1).join(' ') || "Hi!");
            }
            else if (cmd === '/reset') {
                if(confirm("Удалить весь прогресс?")) {
                    localStorage.clear();
                    location.reload();
                }
            }

            input.value = ""; 
            refresh();
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        setInterval(spawn, 800); // Клеверы падают чаще
        refresh();
    </script>
</body>
</html>
