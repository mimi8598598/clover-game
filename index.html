<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Heist Pro</title>
    <style>
        :root { --gold: #ffd700; --red: #ff3333; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle, #051a05, #000); }
        .clover { position: absolute; font-size: 45px; cursor: pointer; z-index: 5; }
        #top { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #bal-display { display: inline-block; padding: 12px 30px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50px; color: var(--gold); font-size: 30px; font-weight: bold; pointer-events: auto; }
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 80px); background: #000; z-index: 200; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        .card { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; text-align: center; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
        .btn:disabled { background: #222; color: #555; }
        .search-box { width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #333; color: #0f0; border-radius: 12px; margin-bottom: 15px; font-size: 18px; box-sizing: border-box; }
        #nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #080808; display: flex; z-index: 300; border-top: 1px solid #1a1a1a; }
        .nav-item { flex: 1; text-align: center; padding-top: 18px; color: #444; cursor: pointer; font-size: 12px; }
        .nav-item.on { color: var(--gold); }
        .nav-item b { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="top"><div id="bal-display">🍀 <span id="val">0</span></div></div>
    <div id="game-view" class="screen active"></div>
    <div id="scr-bank" class="screen">
        <h2 style="text-align:center; color:var(--gold);">🏦 БАНК</h2>
        <div class="card"><span>На счету:</span><h1 style="color: var(--gold);">🍀 <span class="sync">0</span></h1></div>
    </div>
    <div id="scr-heist" class="screen">
        <h2 style="text-align:center; color:var(--red);">🚨 ОГРАБЛЕНИЕ</h2>
        <div class="card">
            <div id="heist-status" style="margin-bottom: 15px;">Готов к делу?</div>
            <div style="background:#000; padding:10px; border-radius:10px; margin-bottom:15px; font-size:13px;">
                💰 ВЫИГРЫШ: <span style="color:lime">+250,000</span><br>
                🚔 ТЮРЬМА: <span style="color:var(--red)">-100,000</span>
            </div>
            <button class="btn" id="heist-btn" onclick="startHeist()">НАЧАТЬ ОГРАБЛЕНИЕ</button>
        </div>
    </div>
    <div id="scr-set" class="screen">
        <h2 style="text-align:center; color:var(--gold);">⚙️ НАСТРОЙКИ</h2>
        <input type="text" id="find" class="search-box" placeholder="">
        <button class="btn" onclick="applyCode()">АКТИВИРОВАТЬ</button>
    </div>
    <div id="nav">
        <div class="nav-item on" onclick="tab('game-view', this)"><b>🎮</b>Игра</div>
        <div class="nav-item" onclick="tab('scr-bank', this)"><b>🏦</b>Банк</div>
        <div class="nav-item" onclick="tab('scr-heist', this)"><b>🚨</b>Дело</div>
        <div class="nav-item" onclick="tab('scr-set', this)"><b>⚙️</b>Настройки</div>
    </div>
    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;
        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            el.classList.add('on');
        }
        function startHeist() {
            const btn = document.getElementById('heist-btn');
            const status = document.getElementById('heist-status');
            btn.disabled = true;
            status.innerText = "Взлом...";
            setTimeout(() => {
                if (Math.random() < 0.4) {
                    score += 250000;
                    status.innerHTML = "<b style='color:lime'>УДАЧНО! +250,000</b>";
                } else {
                    score = Math.max(0, score - 100000);
                    status.innerHTML = "<b style='color:red'>ПОЙМАЛИ! -100,000</b>";
                }
                refresh();
                let t = 10;
                let c = setInterval(() => {
                    btn.innerText = "ЖДАТЬ " + t + "с";
                    t--;
                    if(t < 0) { clearInterval(c); btn.disabled = false; btn.innerText = "НАЧАТЬ ОГРАБЛЕНИЕ"; status.innerText = "Готов?"; }
                }, 1000);
            }, 2000);
        }
        function applyCode() {
            let i = document.getElementById('find').value.toLowerCase();
            if(i.includes('give')){ score += parseInt(i.replace('give ','')) || 0; refresh(); }
            document.getElementById('find').value = '';
        }
        function spawn() {
            if(!document.getElementById('game-view').classList.contains('active')) return;
            const c = document.createElement('div');
            c.className = 'clover'; c.innerHTML = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            c.style.top = '-50px';
            document.getElementById('game-view').appendChild(c);
            let y = -50;
            let f = setInterval(() => {
                y += 2.5; c.style.top = y + 'px';
                if(y > window.innerHeight){ clearInterval(f); c.remove(); }
            }, 16);
            c.onclick = () => { score += 2; refresh(); c.remove(); };
        }
        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            document.querySelectorAll('.sync').forEach(s => s.innerText = score.toLocaleString());
            localStorage.setItem('cl_score', score);
        }
        setInterval(spawn, 1000);
        refresh();
    </script>
</body>
</html>
