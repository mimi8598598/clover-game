<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Quest 2026</title>
    <style>
        :root { --gold: #ffd700; --panel: #111; --green: #00ff00; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* Игровое поле */
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle, #051a05, #000); }
        .clover { position: absolute; font-size: 45px; cursor: pointer; z-index: 5; transition: transform 0.1s; }
        .clover:active { transform: scale(1.4); }

        /* Баланс сверху */
        #top { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #bal-display { display: inline-block; padding: 12px 30px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50px; color: var(--gold); font-size: 32px; font-weight: bold; pointer-events: auto; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }

        /* Экраны */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 80px); background: #000; z-index: 200; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        .card { background: var(--panel); padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }

        /* Кнопки и Инпуты */
        .btn { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #222; color: #555; cursor: default; }
        .search-box { width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #333; color: var(--green); border-radius: 12px; margin-bottom: 15px; font-family: monospace; font-size: 18px; box-sizing: border-box; }

        /* Навигация */
        #nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #080808; display: flex; z-index: 300; border-top: 1px solid #1a1a1a; }
        .nav-item { flex: 1; text-align: center; padding-top: 18px; color: #444; cursor: pointer; font-size: 12px; }
        .nav-item.on { color: var(--gold); }
        .nav-item b { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="top">
        <div id="bal-display">🍀 <span id="val">0</span></div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-view" class="screen active"></div>

    <!-- ЭКРАН БАНКА -->
    <div id="scr-bank" class="screen">
        <h2 style="text-align:center; color:var(--gold);">🏦 БАНК</h2>
        <div class="card" style="flex-direction: column; padding: 40px 20px;">
            <span style="color: #666;">Текущий счет</span>
            <h1 style="font-size: 48px; color: var(--gold); margin: 15px 0;">🍀 <span class="sync">0</span></h1>
        </div>
    </div>

    <!-- ЭКРАН ЗАДАНИЙ -->
    <div id="scr-tasks" class="screen">
        <h2 style="text-align:center; color:var(--gold);">📋 ЗАДАНИЯ</h2>
        <div class="card">
            <div><b>🎁 Бонус новичка</b><br><small>+5,000 🍀</small></div>
            <button class="btn" onclick="takeTask(this, 5000)">ВЗЯТЬ</button>
        </div>
        <div class="card">
            <div><b>🌟 Супер Приз</b><br><small>+50,000 🍀</small></div>
            <button class="btn" onclick="takeTask(this, 50000)">ВЗЯТЬ</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="scr-set" class="screen">
        <h2 style="text-align:center; color:var(--gold);">⚙️ НАСТРОЙКИ</h2>
        
        <p style="color:#666; font-size: 14px;">АКТИВАЦИЯ КОДОВ:</p>
        <!-- Поле теперь абсолютно пустое, как ты просил -->
        <input type="text" id="find" class="search-box" placeholder="">
        <button class="btn" style="width:100%; margin-bottom: 30px;" onclick="applyCode()">АКТИВИРОВАТЬ</button>

        <div class="card">
            <span>🌍 Язык системы</span>
            <button class="btn">РУССКИЙ</button>
        </div>
        <div class="card">
            <span>🔊 Звук</span>
            <button class="btn">ВКЛ</button>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <div id="nav">
        <div class="nav-item on" onclick="tab('game-view', this)"><b>🎮</b>Игра</div>
        <div class="nav-item" onclick="tab('scr-bank', this)"><b>🏦</b>Банк</div>
        <div class="nav-item" onclick="tab('scr-tasks', this)"><b>📋</b>Задания</div>
        <div class="nav-item" onclick="tab('scr-set', this)"><b>⚙️</b>Настройки</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;
        let isLucky = false;

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            el.classList.add('on');
        }

        function takeTask(btn, reward) {
            score += reward;
            refresh();
            btn.innerText = "ГОТОВО";
            btn.disabled = true;
        }

        function applyCode() {
            let input = document.getElementById('find').value.toLowerCase();
            if (input.includes('give')) {
                let num = parseInt(input.replace('give ', '')) || 0;
                score += num;
                refresh();
                alert('Код принят: +' + num);
            } else if (input === 'luck') {
                isLucky = true;
                alert('Удача активирована!');
            }
            document.getElementById('find').value = '';
        }

        function spawn() {
            if (!document.getElementById('game-view').classList.contains('active')) return;
            const item = document.createElement('div');
            item.className = 'clover';
            const special = isLucky ? Math.random() < 0.35 : Math.random() < 0.05;
            item.innerHTML = special ? '🌟' : '🍀';
            item.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            item.style.top = '-60px';
            document.getElementById('game-view').appendChild(item);
            
            let pos = -60;
            let fall = setInterval(() => {
                pos += 2.5;
                item.style.top = pos + 'px';
                if (pos > window.innerHeight) { clearInterval(fall); item.remove(); }
            }, 16);
            
            item.onclick = () => { 
                score += special ? 100 : 2; 
                refresh(); 
                item.remove(); 
            };
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            document.querySelectorAll('.sync').forEach(s => s.innerText = score.toLocaleString());
            localStorage.setItem('cl_score', score);
        }

        setInterval(spawn, 1000);
        refresh();
    </script>
</body>
</html>
