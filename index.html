<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Master: Save Progress</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #051a05; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; font-family: 'Arial Black', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transition: background-image 1s ease-in-out;
            touch-action: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        #ui {
            position: absolute; top: 10px; text-align: center; width: 100%;
            z-index: 10; pointer-events: none;
        }

        #level-display { 
            font-size: 28px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(74, 255, 74, 0.5); 
        }
        
        #goal-display { 
            font-size: 16px; 
            color: #ffd700; 
            margin-top: 5px; 
            text-transform: uppercase; 
            background: rgba(0,0,0,0.6); 
            padding: 5px 15px; 
            border-radius: 20px;
            display: inline-block;
        }

        #reset-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255,0,0,0.3); border: 1px solid white;
            color: white; font-size: 10px; padding: 5px; border-radius: 5px;
            z-index: 100; pointer-events: auto; cursor: pointer;
        }
        
        .clover {
            position: absolute; 
            font-size: 60px; 
            cursor: pointer;
            user-select: none; 
            will-change: transform;
            filter: drop-shadow(0 0 15px rgba(100, 255, 100, 0.7));
            padding: 40px; 
            margin: -40px;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            z-index: 5;
        }

        @keyframes catch {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="level-display">УРОВЕНЬ 1</div>
        <div id="goal-display">Нужно собрать: <span id="needed">12</span></div>
    </div>

    <div id="reset-btn" onclick="resetProgress()">СБРОСИТЬ ПРОГРЕСС</div>

    <script>
        // ЗАГРУЗКА УРОВНЯ ИЗ ПАМЯТИ
        let level = parseInt(localStorage.getItem('clover_level')) || 1;
        let caughtInLevel = 0;
        const maxLevel = 250;

        const backgroundImages = [
            'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=1000',
            'https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1000',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000',
            'https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=1000'
        ];

        function setRandomBackground() {
            const url = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
            document.body.style.backgroundImage = `url('${url}')`;
        }

        const constantSpeed = 4.0;

        function getFinalNeeded(lvl) {
            let base = 10 + Math.floor(lvl * 0.4); 
            const variation = (Math.random() * 0.16) - 0.08;
            return Math.round(base * (1 + variation));
        }

        let totalNeeded = getFinalNeeded(level);

        function updateUI() {
            document.getElementById('level-display').innerText = `УРОВЕНЬ ${level}`;
            document.getElementById('needed').innerText = Math.max(0, totalNeeded - caughtInLevel);
        }

        function createClover() {
            if (caughtInLevel >= totalNeeded) return;

            const clover = document.createElement('div');
            clover.className = 'clover';
            clover.innerHTML = '<span>🍀</span>';
            clover.style.left = Math.random() * (window.innerWidth - 100) + 50 + 'px';
            clover.style.top = '-120px';
            document.body.appendChild(clover);

            let posY = -120;
            let currentCloverSpeed = constantSpeed + (Math.random() * 0.5);

            const fall = setInterval(() => {
                posY += currentCloverSpeed;
                clover.style.transform = `translateY(${posY + 120}px)`;
                if (posY > window.innerHeight + 120) {
                    clearInterval(fall);
                    clover.remove();
                }
            }, 16);

            const handleCatch = (e) => {
                e.preventDefault();
                if (clover.dataset.caught) return;
                clover.dataset.caught = "true";
                clearInterval(fall);
                caughtInLevel++;
                updateUI();
                clover.style.animation = 'catch 0.2s forwards';
                setTimeout(() => clover.remove(), 200);

                if (caughtInLevel >= totalNeeded) nextLevel();
            };

            clover.addEventListener('touchstart', handleCatch, {passive: false});
            clover.onclick = handleCatch;
        }

        function nextLevel() {
            level++;
            // СОХРАНЕНИЕ УРОВНЯ В ПАМЯТЬ
            localStorage.setItem('clover_level', level);
            
            caughtInLevel = 0;
            totalNeeded = getFinalNeeded(level);
            setRandomBackground();
            updateUI();
        }

        function resetProgress() {
            if(confirm("Сбросить игру на 1 уровень?")) {
                localStorage.removeItem('clover_level');
                location.reload();
            }
        }

        setInterval(createClover, 1000);
        setRandomBackground();
        updateUI();
    </script>
</body>
</html>
