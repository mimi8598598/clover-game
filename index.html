<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Tycoon Admin</title>
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --panel: #161616; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* Экраны */
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .screen.on { display: block; }

        /* Игра */
        #game-view { text-align: center; display: none; }
        #game-view.on { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #val { font-size: 40px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .clover { position: absolute; font-size: 40px; cursor: pointer; z-index: 5; transition: transform 0.1s; }

        /* Карточки и кнопки */
        .card { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* Навигация */
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #888; font-weight: bold; }
        .nav-item.active { color: var(--gold); }

        /* Подсказки */
        #hints { position: absolute; bottom: 105%; left: 0; width: 100%; background: rgba(0,0,0,0.95); border: 1px solid var(--gold); border-radius: 10px; display: none; z-index: 1000; max-height: 200px; overflow-y: auto; }
        #hints div { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Уведомления -->
    <div id="global-msg" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:black;padding:12px 25px;border-radius:30px;font-weight:bold;z-index:2000;display:none;box-shadow:0 0 15px var(--gold);"></div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-view" class="screen on">
        <div style="margin-top: -50px;">
            <p>Твой баланс:</p>
            <div id="val">0</div>
            <p>Нажимай на клеверы!</p>
        </div>
    </div>

    <!-- ЭКРАН МАГАЗИНА -->
    <div id="scr-shop" class="screen">
        <h2 style="color:var(--gold); text-align:center;">🛠 МАГАЗИН</h2>
        <div class="card">
            <b>Маска</b><br><small>Снижает штрафы при ограблении</small>
            <button class="btn" style="margin-top:10px;" onclick="alert('Куплено!')">50,000 🍀</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="scr-set" class="screen">
        <div class="card">
            <h3 style="color: var(--gold); margin-top: 0;">⚙️ Админ-панель</h3>
            <div style="position:relative; margin-bottom: 15px;">
                <input type="text" id="find" oninput="showHints(this.value)" placeholder="Введите / для команд..." 
                       style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: white; outline: none; box-sizing: border-box;">
                <div id="hints"></div>
            </div>
            <button class="btn" onclick="applyCode()">Выполнить</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="nav">
        <div class="nav-item active" onclick="tab('game-view', this)">🎮 Игра</div>
        <div class="nav-item" onclick="tab('scr-shop', this)">🛠 Шоп</div>
        <div class="nav-item" onclick="tab('scr-set', this)">⚙️ Настр.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;

        // Команды
        const commandList = [
            { cmd: '/random give ', desc: 'Раздать (кол-во сумма)' },
            { cmd: '/give money me ', desc: 'Выдать себе клеверы' },
            { cmd: '/bonus', desc: 'Получить подарок 🎁' },
            { cmd: '/say ', desc: 'Глобальный чат 📢' },
            { cmd: '/clear me', desc: 'Обнулить свой баланс' }
        ];

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById(id).classList.add('on');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function spawn() {
            if (!document.getElementById('game-view').classList.contains('on')) return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerText = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            c.style.top = Math.random() * (window.innerHeight - 150) + 'px';
            c.onclick = function() {
                score += 100;
                refresh();
                this.remove();
            };
            document.getElementById('game-view').appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function showHints(val) {
            let hBox = document.getElementById('hints');
            if (val.startsWith('/')) {
                hBox.innerHTML = '';
                hBox.style.display = 'block';
                commandList.forEach(item => {
                    let div = document.createElement('div');
                    div.innerHTML = `<span style="color:gold;">${item.cmd}</span><br><small style="color:#aaa;">${item.desc}</small>`;
                    div.onclick = () => {
                        document.getElementById('find').value = item.cmd;
                        hBox.style.display = 'none';
                    };
                    hBox.appendChild(div);
                });
            } else { hBox.style.display = 'none'; }
        }

        function applyCode() {
            let v = document.getElementById('find').value.trim();
            let args = v.split(' ');
            let cmd = args[0].toLowerCase();

            if (cmd === '/give' && args[2] === 'me') {
                score += parseInt(args[3]) || 0;
                showGlobal("💰 Баланс пополнен!");
            } else if (cmd === '/random' && args[1] === 'give') {
                showGlobal(`🎲 Раздача! ${args[2]} игроков получили по ${args[3]} 🍀`);
            } else if (cmd === '/bonus') {
                score += 5000; showGlobal("🎁 Бонус +5000!");
            } else if (cmd === '/say') {
                showGlobal("📢 " + args.slice(1).join(' '));
            } else if (cmd === '/clear' && args[1] === 'me') {
                score = 0; showGlobal("🗑 Сброшено");
            }
            document.getElementById('find').value = "";
            refresh();
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        function showGlobal(t) {
            let e = document.getElementById('global-msg');
            e.innerText = t; e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 3000);
        }

        setInterval(spawn, 1000);
        refresh();
    </script>
</body>
</html>
