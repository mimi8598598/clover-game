<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Tycoon: Pro UI</title>
    <style>
        :root { --neon: #4aff4a; --gold: #ffd700; }
        body { margin: 0; background: #051a05; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        
        /* ИНТЕРФЕЙС - не мешает кликать */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        .clickable { pointer-events: auto; }

        /* ВЕРХНИЙ СЧЕТЧИК */
        #top-info { margin-top: 15px; text-align: center; }
        #money-display { font-size: 38px; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .lvl-tag { font-size: 12px; color: var(--neon); background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 10px; }

        /* МАГАЗИН */
        #shop-toggle { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon); color: black; border: none; padding: 10px 30px; border-radius: 25px; font-weight: bold; box-shadow: 0 0 15px var(--neon); cursor: pointer; }
        
        #shop-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: rgba(0,20,0,0.98); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; box-shadow: 0 0 50px black; pointer-events: auto; }
        .upgrade-item { background: rgba(255,255,255,0.05); padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon); }
        .buy-btn { background: var(--neon); border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .shop-bal { text-align: right; color: var(--gold); font-size: 14px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .close-x { float: right; color: #ff4444; cursor: pointer; font-size: 20px; }

        /* ЛИНИЯ И КЛЕВЕРЫ */
        #bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #111; }
        #progress-line { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.3s; }
        .clover { position: absolute; font-size: 60px; cursor: pointer; padding: 40px; margin: -40px; z-index: 5; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-info">
            <div id="money-display">0</div>
            <span class="lvl-tag">УРОВЕНЬ <span id="lvl">1</span></span>
        </div>

        <button id="shop-toggle" class="clickable" onclick="toggleShop()">🛒 МАГАЗИН</button>

        <div id="shop-modal">
            <span class="close-x" onclick="toggleShop()">✖</span>
            <h3 style="margin:0 0 15px 0; color:var(--neon)">УЛУЧШЕНИЯ</h3>
            
            <div class="upgrade-item">
                <div class="up-info"><b>💪 СИЛА</b><br><small>Цена: </small><span id="c-click" style="color:var(--gold)">20</span></div>
                <button class="buy-btn" onclick="buy('click')">КУПИТЬ</button>
            </div>
            
            <div class="upgrade-item">
                <div class="up-info"><b>🤖 АВТО</b><br><small>Цена: </small><span id="c-auto" style="color:var(--gold)">50</span></div>
                <button class="buy-btn" onclick="buy('auto')">КУПИТЬ</button>
            </div>

            <div class="shop-bal">Твой баланс: <span id="inner-bal">0</span> 🍀</div>
        </div>
    </div>

    <div id="bottom-bar"><div id="progress-line"></div></div>

    <script>
        let data = {
            bal: parseInt(localStorage.getItem('cl_bal')) || 0,
            lvl: parseInt(localStorage.getItem('cl_lvl')) || 1,
            pwr: parseInt(localStorage.getItem('cl_pwr')) || 1,
            auto: parseInt(localStorage.getItem('cl_auto')) || 0
        };

        let caught = 0;
        let need = 20 + (data.pwr * 15) + (data.lvl * 10);

        function save() {
            for(let key in data) localStorage.setItem('cl_'+key, data[key]);
        }

        function updateUI() {
            document.getElementById('money-display').innerText = Math.floor(data.bal);
            document.getElementById('inner-bal').innerText = Math.floor(data.bal);
            document.getElementById('lvl').innerText = data.lvl;
            document.getElementById('c-click').innerText = Math.floor(20 * Math.pow(1.6, data.pwr - 1));
            document.getElementById('c-auto').innerText = Math.floor(50 * Math.pow(1.7, data.auto));
            let prog = (caught / need) * 100;
            document.getElementById('progress-line').style.width = Math.min(100, prog) + "%";
        }

        function toggleShop() {
            let s = document.getElementById('shop-modal');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
            updateUI();
        }

        function buy(type) {
            if (type === 'click') {
                let cost = Math.floor(20 * Math.pow(1.6, data.pwr - 1));
                if (data.bal >= cost) { data.bal -= cost; data.pwr++; }
            } else if (type === 'auto') {
                let cost = Math.floor(50 * Math.pow(1.7, data.auto));
                if (data.bal >= cost) { data.bal -= cost; data.auto++; }
            }
            need = 20 + (data.pwr * 15) + (data.lvl * 10);
            save(); updateUI();
        }

        function createClover() {
            if (caught >= need) return;
            const c = document.createElement('div');
            c.className = 'clover'; c.innerHTML = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 80) + 40 + 'px';
            c.style.top = '-80px';
            document.body.appendChild(c);
            let y = -80, speed = 3.5 + (data.lvl * 0.1);
            const fly = setInterval(() => {
                y += speed;
                c.style.transform = `translateY(${y + 80}px)`;
                if (y > window.innerHeight) { clearInterval(fly); c.remove(); }
            }, 16);
            const hit = (e) => {
                e.preventDefault(); if (c.dataset.h) return; c.dataset.h = "true";
                clearInterval(fly); c.remove();
                data.bal += data.pwr; caught += data.pwr;
                if (caught >= need) { data.lvl++; caught = 0; need = 20 + (data.pwr * 15) + (data.lvl * 10); }
                save(); updateUI();
            };
            c.onclick = hit; c.addEventListener('touchstart', hit);
        }

        setInterval(() => {
            if (data.auto > 0 && caught < need) {
                data.bal += data.auto; caught += data.auto;
                if (caught >= need) { data.lvl++; caught = 0; need = 20 + (data.pwr * 15) + (data.lvl * 10); }
                save(); updateUI();
            }
        }, 1000);

        setInterval(() => { if(caught < need) { createClover(); setTimeout(createClover, 200); } }, 1000);
        updateUI();
    </script>
</body>
</html>
