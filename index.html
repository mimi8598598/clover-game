<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Master: Triple</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #051a05; background-size: cover; background-position: center;
            color: white; font-family: 'Arial Black', sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center;
            touch-action: none;
        }
        body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1; pointer-events: none;
        }
        #ui { position: absolute; top: 10px; text-align: center; width: 100%; z-index: 10; pointer-events: none; }
        #level-display { font-size: 28px; text-shadow: 0 0 10px rgba(74, 255, 74, 0.5); }
        #goal-display { font-size: 16px; color: #ffd700; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; display: inline-block; }
        #speed-tag { font-size: 12px; color: #ff4444; margin-top: 5px; font-weight: bold; }
        
        .clover {
            position: absolute; font-size: 60px; cursor: pointer; user-select: none;
            filter: drop-shadow(0 0 15px rgba(100, 255, 100, 0.7));
            padding: 45px; margin: -45px; display: flex; justify-content: center; align-items: center;
            touch-action: manipulation; z-index: 5;
        }
        @keyframes catch { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.1); opacity: 0; } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="level-display">УРОВЕНЬ 1</div>
        <div id="goal-display">Нужно: <span id="needed">12</span></div>
        <div id="speed-tag">СКОРОСТЬ: <span id="speed-val">4.0</span></div>
    </div>

    <script>
        let level = parseInt(localStorage.getItem('clover_level')) || 1;
        let caughtInLevel = 0;
        
        const backgroundImages = [
            'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=800',
            'https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=800',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800'
        ];

        function setBg() { 
            document.body.style.backgroundImage = `url('${backgroundImages[level % backgroundImages.length]}')`; 
        }

        function getSpeed(lvl) { 
            return 4.0 + (Math.floor((lvl - 1) / 3.5) * 0.2); 
        }

        function getNeeded(lvl) { 
            let base = 10 + Math.floor(lvl * 0.4);
            return Math.round(base * (1 + (Math.random() * 0.16 - 0.08))); 
        }
        
        let totalNeeded = getNeeded(level);
        let speed = getSpeed(level);

        function updateUI() {
            document.getElementById('level-display').innerText = `УРОВЕНЬ ${level}`;
            document.getElementById('needed').innerText = Math.max(0, totalNeeded - caughtInLevel);
            document.getElementById('speed-val').innerText = speed.toFixed(1);
        }

        function createClover() {
            if (caughtInLevel >= totalNeeded) return;
            
            const cl = document.createElement('div');
            cl.className = 'clover'; 
            cl.innerHTML = '🍀';
            cl.style.left = Math.random() * (window.innerWidth - 100) + 50 + 'px';
            cl.style.top = '-120px';
            document.body.appendChild(cl);
            
            let y = -120;
            let individualSpeed = speed + (Math.random() * 0.5);

            const fall = setInterval(() => {
                y += individualSpeed;
                cl.style.transform = `translateY(${y + 120}px)`;
                if (y > window.innerHeight + 120) { 
                    clearInterval(fall); 
                    cl.remove(); 
                }
            }, 16);

            const catchFunc = (e) => {
                e.preventDefault(); 
                if (cl.dataset.hit) return; 
                cl.dataset.hit = "true";
                clearInterval(fall); 
                caughtInLevel++; 
                updateUI();
                cl.style.animation = 'catch 0.2s forwards';
                setTimeout(() => cl.remove(), 200);

                if (caughtInLevel >= totalNeeded) { 
                    level++; 
                    localStorage.setItem('clover_level', level); 
                    caughtInLevel = 0; 
                    totalNeeded = getNeeded(level); 
                    speed = getSpeed(level); 
                    setBg(); 
                    updateUI(); 
                }
            };
            cl.addEventListener('touchstart', catchFunc); 
            cl.onclick = catchFunc;
        }

        setInterval(() => {
            if (caughtInLevel < totalNeeded) {
                createClover();
                setTimeout(createClover, 50);
                setTimeout(createClover, 100);
            }
        }, 1000);

        setBg(); 
        updateUI();
    </script>
</body>
</html>
