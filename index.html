<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Game App</title>
    <style>
        :root { --gold: #ffd700; --panel: #1a1a1a; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* Игра */
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle, #0a250a, #000); }
        .clover { position: absolute; font-size: 45px; cursor: pointer; z-index: 5; transition: transform 0.1s; }
        .gold { filter: drop-shadow(0 0 15px gold); }

        /* Шапка */
        #header { position: fixed; top: 0; width: 100%; padding: 20px 0; text-align: center; z-index: 100; pointer-events: none; }
        #balance-display { display: inline-block; pointer-events: auto; font-size: 32px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px gold; cursor: pointer; background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 40px; border: 2px solid var(--gold); }

        /* Экраны меню */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 80px); background: #000; z-index: 200; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .active-screen { display: block; }
        h2 { color: var(--gold); text-align: center; font-size: 26px; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 10px; }

        /* Карточки разделов */
        .card { background: var(--panel); border-radius: 18px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Навигация */
        #navbar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0d0d0d; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 300; }
        .nav-item { text-align: center; color: #555; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item div { font-size: 28px; margin-bottom: 4px; }

        /* Админка */
        #admin-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #111; border: 2px solid var(--gold); border-radius: 25px; padding: 25px; z-index: 1000; box-shadow: 0 0 100px #000; }
        .adm-btn { width: 100%; margin: 8px 0; padding: 14px; background: #222; color: white; border: 1px solid #444; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div id="balance-display" onclick="admTry()">🍀 <span id="bal-val">0</span></div>
    </div>

    <div id="game-view"></div>

    <div id="scr-bank" class="screen">
        <h2>БАНК</h2>
        <div class="card" style="flex-direction: column; text-align: center;">
            <span style="color: #666;">Ваш капитал:</span>
            <span style="font-size: 35px; color: var(--gold); margin: 15px 0;">🍀 <span class="sync-bal">0</span></span>
            <button class="btn" style="width: 100%; background: #222; color: #444;">ВЫВОД (ОТ 1МЛН)</button>
        </div>
        <div class="card">
            <div><b>Прибыль за клик</b><br><small>Текущая: +2 🍀</small></div>
            <button class="btn">UPGRADE</button>
        </div>
    </div>

    <div id="scr-tasks" class="screen">
        <h2>ЗАДАНИЯ</h2>
        <div class="card">
            <div><b>Подписка на ТГ</b><br><small>+10,000 🍀</small></div>
            <button class="btn" onclick="getGift(10000)">ВЗЯТЬ</button>
        </div>
        <div class="card">
            <div><b>Бонус дня</b><br><small>+2,500 🍀</small></div>
            <button class="btn" onclick="getGift(2500)">ВЗЯТЬ</button>
        </div>
    </div>

    <div id="scr-settings" class="screen">
        <h2>НАСТРОЙКИ</h2>
        <div class="card"><span>Звук</span><button class="btn">ВКЛ</button></div>
        <div class="card"><span>Язык</span><button class="btn">РУ</button></div>
        <p style="text-align: center; color: #333; margin-top: 40px;">v2.5 ADMIN EDITION</p>
    </div>

    <div id="admin-box">
        <h3 style="text-align:center; color:gold; margin-top:0;">АДМИН 5757</h3>
        <button class="adm-btn" onclick="add1M()">💰 +1,000,000 🍀</button>
        <button class="adm-btn" onclick="turnLuck()">🍀 УДАЧА 35% (ВКЛ)</button>
        <button class="adm-btn" style="background:#500;" onclick="document.getElementById('admin-box').style.display='none'">ЗАКРЫТЬ</button>
    </div>

    <div id="navbar">
        <div class="nav-item active" onclick="go('game')"><div>🎮</div>Игра</div>
        <div class="nav-item" onclick="go('bank')"><div>🏦</div>Банк</div>
        <div class="nav-item" onclick="go('tasks')"><div>📋</div>Задания</div>
        <div class="nav-item" onclick="go('settings')"><div>⚙️</div>Настройки</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('c_bal')) || 0;
        let isLuck = false;
        let aClicks = 0;

        function go(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(name !== 'game') document.getElementById('scr-' + name).classList.add('active-screen');
            event.currentTarget.classList.add('active');
        }

        function create() {
            const world = document.getElementById('game-view');
            const c = document.createElement('div');
            const roll = Math.random() * 100;
            const gold = isLuck ? (roll < 35) : (roll < 5);
            
            c.className = 'clover' + (gold ? ' gold' : '');
            c.innerHTML = gold ? '🌟' : '🍀';
            c.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            c.style.top = '-60px';
            world.appendChild(c);

            let y = -60;
            let fall = setInterval(() => {
                y += 1.5; // Медленная скорость
                c.style.top = y + 'px';
                if(y > window.innerHeight) { clearInterval(fall); c.remove(); }
            }, 16);

            c.onclick = () => {
                clearInterval(fall);
                balance += gold ? 100 : 2; // +2 за обычный клик
                update();
                c.remove();
            };
        }

        function admTry() {
            aClicks++;
            if(aClicks >= 5) {
                if(prompt("PASSWORD:") === "5757") document.getElementById('admin-box').style.display='block';
                aClicks = 0;
            }
        }

        function add1M() { balance += 1000000; update(); }
        function turnLuck() { isLuck = true; alert("Шанс 35% активирован!"); }
        function getGift(n) { balance += n; update(); alert("Получено!"); }

        function update() {
            document.getElementById('bal-val').innerText = balance.toLocaleString();
            document.querySelectorAll('.sync-bal').forEach(s => s.innerText = balance.toLocaleString());
            localStorage.setItem('c_bal', balance);
        }

        // Спавн по 2 клевера
        setInterval(() => { create(); create(); }, 1400);
        update();
    </script>
</body>
</html>
