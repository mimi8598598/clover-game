<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover: Risk & Skill</title>
    <style>
        :root { --neon: #4aff4a; --pink: #ff00ff; --gold: #ffd700; --red: #ff4444; }
        body { margin: 0; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; touch-action: none; background: #000; }
        
        /* ЭФФЕКТ КОМБО */
        .fever-bg { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { 
            0% { box-shadow: inset 0 0 50px rgba(74, 255, 74, 0.2); } 
            100% { box-shadow: inset 0 0 150px rgba(74, 255, 74, 0.5); } 
        }

        #ui-top { position: absolute; top: 15px; width: 100%; text-align: center; z-index: 20; pointer-events: none; }
        #money-display { font-size: 45px; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        #combo-tag { font-size: 18px; color: var(--neon); opacity: 0; transition: 0.3s; }

        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .shop-item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 15px; width: 90%; border: 2px solid var(--pink); display: flex; justify-content: space-between; align-items: center; }
        
        .buy-btn { background: var(--pink); color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; }
        .clover { position: absolute; font-size: 65px; z-index: 5; padding: 40px; margin: -40px; cursor: pointer; user-select: none; }
        .bomb { filter: drop-shadow(0 0 20px var(--red)) hue-rotate(120deg); } /* Красный клевер */
        .artifact { filter: drop-shadow(0 0 30px var(--cyan)); font-size: 40px; }

        #progress-container { position: absolute; bottom: 0; width: 100%; height: 12px; background: #111; }
        #progress-fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 20px var(--neon); }

        #nav-btns { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 30; }
        .nav-btn { background: rgba(0,0,0,0.8); color: white; border: 2px solid var(--neon); padding: 15px 35px; border-radius: 40px; font-weight: bold; }
    </style>
</head>
<body id="main-body">

    <div id="game-screen">
        <div id="ui-top">
            <div id="money-display">0</div>
            <div id="combo-tag">COMBO X2 🔥</div>
            <div style="font-size:18px; margin-top:5px;">❤️ <span id="hp-val">3</span> | LVL <span id="lvl">1</span></div>
        </div>
        
        <div id="nav-btns">
            <button class="nav-btn" onclick="openPage('shop-page')">СИЛА</button>
            <button class="nav-btn" style="border-color:var(--gold)" onclick="openPage('quest-page')">МИССИИ</button>
        </div>
        <div id="progress-container"><div id="progress-fill"></div></div>
    </div>

    <div id="shop-page" class="full-page">
        <h1 style="color:var(--pink)">ПРОКАЧКА</h1>
        <div class="shop-item">
            <div><b>МОЩНЫЙ КЛИК</b><br><small>+50 силы</small></div>
            <button class="buy-btn" id="btn-pwr" onclick="buyPwr()">0</button>
        </div>
        <button onclick="closePage()" style="margin-top:auto; color:white; background:none; border:1px solid #fff; padding:15px 50px; border-radius:30px;">НАЗАД</button>
    </div>

    <div id="quest-page" class="full-page">
        <h1 style="color:var(--gold)">МИССИИ</h1>
        <div id="quest-list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button onclick="closePage()" style="margin-top:auto; color:white; background:none; border:1px solid #fff; padding:15px 50px; border-radius:30px;">НАЗАД</button>
    </div>

    <script>
        let data = {
            bal: parseInt(localStorage.getItem('r_bal')) || 0,
            lvl: 1,
            pwr: parseInt(localStorage.getItem('r_pwr')) || 10,
            qDone: JSON.parse(localStorage.getItem('r_qdone')) || []
        };

        let hp = 3, isPaused = false, caught = 0, combo = 0, need = 500;

        function updateUI() {
            let cost = Math.floor(10000 * Math.pow(3, (data.pwr-10)/50));
            document.getElementById('money-display').innerText = Math.floor(data.bal).toLocaleString();
            document.getElementById('hp-val').innerText = hp;
            document.getElementById('lvl').innerText = data.lvl;
            document.getElementById('btn-pwr').innerText = cost.toLocaleString();
            document.getElementById('btn-pwr').disabled = data.bal < cost;
            document.getElementById('progress-fill').style.width = Math.min(100, (caught/need)*100) + "%";
            
            const comboTag = document.getElementById('combo-tag');
            if(combo >= 10) {
                comboTag.style.opacity = 1;
                document.getElementById('main-body').classList.add('fever-bg');
            } else {
                comboTag.style.opacity = 0;
                document.getElementById('main-body').classList.remove('fever-bg');
            }
            renderQuests();
        }

        function createClover() {
            if(isPaused) return;
            const c = document.createElement('div');
            let rand = Math.random();
            let type = "normal";

            if (rand < 0.08) type = "bomb"; 
            else if (rand < 0.12) type = "gold";
            else if (rand < 0.14) type = "artifact";

            c.className = 'clover';
            if(type === "bomb") { c.innerHTML = '💣'; c.classList.add('bomb'); }
            else if(type === "gold") { c.innerHTML = '📀'; }
            else if(type === "artifact") { c.innerHTML = '💎'; c.classList.add('artifact'); }
            else { c.innerHTML = '🍀'; }

            c.style.left = Math.random() * (window.innerWidth - 80) + 40 + 'px';
            c.style.top = '-80px';
            document.body.appendChild(c);

            let speed = (4 + (data.lvl * 0.4));
            if(type === "artifact") speed *= 2.5;

            let y = -80;
            const fly = setInterval(() => {
                if(!isPaused) y += speed;
                c.style.transform = `translateY(${y + 80}px)`;
                if(y > window.innerHeight) { 
                    clearInterval(fly); c.remove(); 
                    if(type === "normal") { hp--; combo = 0; updateUI(); if(hp<=0) location.reload(); }
                }
            }, 16);

            c.onclick = () => {
                clearInterval(fly);
                if(type === "bomb") {
                    data.bal = Math.floor(data.bal * 0.7); // Штраф 30% от всех денег!
                    hp--; combo = 0;
                    document.body.style.background = "red";
                    setTimeout(() => document.body.style.background = "black", 100);
                } else {
                    let gain = data.pwr;
                    if(combo >= 10) gain *= 2;
                    if(type === "gold") gain *= 10;
                    if(type === "artifact") gain *= 50;
                    
                    data.bal += gain; caught += gain;
                    combo++;
                    if(type === "gold" && hp < 3) hp++;
                }
                
                if(caught >= need) { data.lvl++; caught = 0; need += 1000; }
                c.remove(); save(); updateUI();
            }
        }

        function buyPwr() {
            let cost = Math.floor(10000 * Math.pow(3, (data.pwr-10)/50));
            if (data.bal >= cost) { data.bal -= cost; data.pwr += 50; save(); updateUI(); }
        }

        function renderQuests() {
            const list = document.getElementById('quest-list');
            list.innerHTML = "";
            let qArr = [
                { id: 401, txt: "Набить Комбо x10", goal: () => combo >= 10, prize: 50000 },
                { id: 402, txt: "Собрать 2 млн", goal: () => data.bal >= 2000000, prize: 500000 }
            ];
            qArr.forEach(q => {
                let done = data.qDone.includes(q.id);
                list.innerHTML += `<div class="shop-item"><div>${q.txt}</div><button onclick="claim(${q.id},${q.prize})" ${(done||!q.goal())?'disabled':''} class="buy-btn">${done?'OK':'ВЗЯТЬ'}</button></div>`;
            });
        }

        function claim(id, p) { data.bal += p; data.qDone.push(id); save(); updateUI(); }
        function openPage(id) { isPaused = true; document.getElementById(id).style.display = 'flex'; updateUI(); }
        function closePage() { document.querySelectorAll('.full-page').forEach(p => p.style.display='none'); isPaused = false; }
        function save() { localStorage.setItem('r_bal', data.bal); localStorage.setItem('r_pwr', data.pwr); localStorage.setItem('r_qdone', JSON.stringify(data.qDone)); }

        setInterval(() => { if(!isPaused) createClover(); }, 800);
        updateUI();
    </script>
</body>
</html>
