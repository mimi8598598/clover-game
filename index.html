<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Game: Pro Edition</title>
    <style>
        :root { --gold: #ffd700; }
        body { margin: 0; background: radial-gradient(circle, #0a1a0a, #000); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Экран игры */
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #balance-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 35px; color: var(--gold); text-shadow: 0 0 15px gold; z-index: 10; cursor: pointer; text-align: center; }
        
        /* Клеверы */
        .clover { position: absolute; font-size: 40px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .gold-clover { filter: drop-shadow(0 0 10px gold); animation: glow 1s infinite alternate; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.2); } }

        /* Админка */
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #111; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; z-index: 1000; box-shadow: 0 0 50px #000; }
        .adm-btn { width: 100%; margin: 5px 0; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; text-align: left; font-weight: bold; font-size: 14px; }
        
        /* Лидерборд */
        #lb-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; }
        .lb-box { width: 85%; background: #111; border: 1px solid var(--gold); border-radius: 15px; padding: 20px; max-width: 350px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="balance-ui" onclick="adminClick()">
        🍀 <span id="val">0</span>
        <div style="font-size: 10px; color: #444;">ID: 5757-ADMIN</div>
    </div>
    <button onclick="toggleLB()" style="position:fixed; top:20px; right:20px; font-size:30px; background:none; border:none; z-index:100;">🏆</button>
</div>

<div id="admin-panel">
    <h3 style="text-align:center; color:var(--gold); margin:0 0 10px 0;">АДМИН-ПУЛЬТ</h3>
    <button class="adm-btn" onclick="qCmd('give')">💰 ВЫДАТЬ ДЕНЬГИ МНЕ</button>
    <button class="adm-btn" onclick="qCmd('to')">🎁 ПЕРЕВЕСТИ ИГРОКУ</button>
    <button class="adm-btn" onclick="qCmd('ghost')">👻 ПРИЗРАК (СКРЫТЬ МЕНЯ)</button>
    <button class="adm-btn" onclick="qCmd('luck')">🍀 УДАЧА x2 (35% ШАНС)</button>
    <button class="adm-btn" onclick="qCmd('say')">📢 ОБЪЯВЛЕНИЕ ВСЕМ</button>
    <button class="adm-btn" onclick="qCmd('rain')">🌧️ КЛЕВЕРНЫЙ ДОЖДЬ</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; margin-top:10px; background:red; color:white; border:none; padding:10px; border-radius:10px;">ЗАКРЫТЬ</button>
</div>

<div id="lb-modal">
    <div class="lb-box">
        <h3 style="text-align:center; color:var(--gold);">ТОП ИГРОКОВ</h3>
        <div id="lb-list" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="toggleLB()" style="width:100%; padding:10px; margin-top:10px; background:var(--gold); border:none; border-radius:10px;">ВЕРНУТЬСЯ</button>
    </div>
</div>

<script>
    let balance = parseInt(localStorage.getItem('user_balance')) || 0;
    let isAdminInvisible = localStorage.getItem('admin_ghost_mode') === 'true';
    let timeInGame = 0;
    let isLuckEvent = false;
    let aClicks = 0;

    // --- ЛОГИКА ПАДЕНИЯ КЛЕВЕРОВ ---
    function spawnClover() {
        const clover = document.createElement('div');
        const isGold = Math.random() * 100 <= (isLuckEvent ? (timeInGame >= 15 ? 35 : 5) : (timeInGame >= 30 ? 15 : 1));
        
        clover.className = 'clover' + (isGold ? ' gold-clover' : '');
        clover.innerHTML = isGold ? '🌟' : '🍀';
        clover.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        clover.style.top = '-50px';
        
        document.getElementById('game-container').appendChild(clover);

        let pos = -50;
        let speed = Math.random() * 2 + 2;
        
        let fall = setInterval(() => {
            pos += speed;
            clover.style.top = pos + 'px';
            if (pos > window.innerHeight) {
                clearInterval(fall);
                clover.remove();
            }
        }, 20);

        clover.onclick = () => {
            clearInterval(fall);
            let reward = isGold ? 1000 : 10;
            balance += reward;
            updateUI();
            clover.remove();
        };
    }

    setInterval(spawnClover, 800); // Спавн каждые 0.8 сек
    setInterval(() => { timeInGame++; }, 60000);

    // --- АДМИН-ЛОГИКА ---
    function adminClick() {
        aClicks++;
        if(aClicks >= 5) {
            if(prompt("ВВЕДИТЕ КОД:") === "5757") document.getElementById('admin-panel').style.display='block';
            aClicks = 0;
        }
    }

    function qCmd(t) {
        if (t === 'give') balance += parseInt(prompt("Сколько?") || 0);
        if (t === 'luck') { 
            isLuckEvent = true; 
            alert("Удача 2x включена на 5 минут!"); 
            setTimeout(() => isLuckEvent = false, 300000); 
        }
        if (t === 'ghost') { 
            isAdminInvisible = !isAdminInvisible; 
            localStorage.setItem('admin_ghost_mode', isAdminInvisible);
            alert("Призрак: " + isAdminInvisible);
        }
        if (t === 'say') alert("📢 АДМИН: " + prompt("Текст:"));
        updateUI();
        save();
    }

    function updateUI() {
        document.getElementById('val').innerText = balance.toLocaleString();
    }

    function save() { localStorage.setItem('user_balance', balance); }

    function toggleLB() {
        let m = document.getElementById('lb-modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        if(m.style.display === 'flex') {
            document.getElementById('lb-list').innerHTML = `<div style="display:flex; justify-content:space-between; padding:10px; color:gold;"><span>1. You</span><span>${balance.toLocaleString()} 🍀</span></div>`;
        }
    }

    updateUI();
</script>

</body>
</html>
