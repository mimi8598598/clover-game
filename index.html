<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Tycoon Slow</title>
    <style>
        :root { --gold: #ffd700; --green: #00ff88; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; overflow: hidden; }
        .screen.on { display: block; }

        #game-view.on { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #val { font-size: 55px; color: var(--gold); font-weight: bold; text-shadow: 0 0 25px rgba(255,215,0,0.5); z-index: 10; position: relative; pointer-events: none; }
        
        /* КЛЕВЕРЫ: МЕДЛЕННЫЙ ПОЛЕТ */
        .clover { 
            position: absolute; 
            font-size: 45px; 
            cursor: pointer; 
            z-index: 5; 
            user-select: none;
            top: -10vh; /* Появление чуть выше экрана */
            will-change: transform; /* Оптимизация плавности */
            animation: fall 7s linear forwards; 
        }

        @keyframes fall {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(115vh) rotate(360deg); }
        }

        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align:center; padding: 20px 5px; cursor: pointer; color: #666; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--gold); background: #1a1a1a; }

        /* УВЕДОМЛЕНИЕ */
        #global-msg {
            display: none;
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: black;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .admin-icon {
            width: 32px;
            height: 32px;
            vertical-align: middle;
            margin-right: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="global-msg">
        <div id="msg-content" style="display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <div id="game-view" class="screen on">
        <div id="val">0</div>
        <p style="color:#888; margin-top: 5px; letter-spacing: 2px; pointer-events: none;">CLOVERS</p>
    </div>

    <div id="scr-shop" class="screen">
        <h2 style="color:var(--green); text-align:center;">🛠 МАГАЗИН</h2>
        <div class="card">
            <b>🎭 Маска</b> <br><small>Защита профиля</small>
            <button class="btn" style="margin-top:15px;" onclick="showGlobal('Уже куплено!')">50,000 🍀</button>
        </div>
    </div>

    <div id="scr-set" class="screen">
        <h2 style="text-align:center; color:var(--gold);">⚙️ НАСТРОЙКИ</h2>
        <div class="card">
            <input type="text" id="find" class="input-box" placeholder="Введи /команду...">
            <button class="btn" onclick="applyCode()">выполнить</button>
        </div>
        <button class="btn" style="background: #cc0000; color: white;" onclick="resetGame()">ОБНУЛИТЬ ВСЁ</button>
    </div>

    <div id="nav">
        <div class="nav-item active" onclick="tab('game-view', this)">🎮 ИГРА</div>
        <div class="nav-item" onclick="tab('scr-shop', this)">🛠 ШОП</div>
        <div class="nav-item" onclick="tab('scr-set', this)">⚙️ НАСТР.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;
        const adminImgHtml = `<img src="https://i.ibb.co/Xf8Y8mK/image-94.png" class="admin-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995531.png'">`;

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById(id).classList.add('on');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function spawn() {
            if (!document.getElementById('game-view').classList.contains('on')) return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerText = '🍀';
            
            // Случайная позиция по горизонтали
            c.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            
            // Ровно 7 секунд падения
            c.style.animationDuration = '7s';
            
            c.onclick = function() {
                score += 100;
                refresh();
                this.remove(); // Исчезает при клике
            };
            
            document.getElementById('game-view').appendChild(c);
            
            // Удаляем объект после того как он точно покинул экран (8 сек для запаса)
            setTimeout(() => { if(c.parentNode) c.remove(); }, 8000);
        }

        function showGlobal(text) {
            const el = document.getElementById('global-msg');
            const content = document.getElementById('msg-content');
            content.innerHTML = adminImgHtml + `<span>${text}</span>`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function resetGame() {
            if(confirm("Сбросить игру?")) { localStorage.clear(); location.reload(); }
        }

        function applyCode() {
            let input = document.getElementById('find');
            let v = input.value.trim();
            if (!v.startsWith('/')) return;
            let args = v.split(' ');
            let cmd = args[0].toLowerCase();

            if (cmd === '/6633') { score += 5000000; showGlobal("👑 +5,000,000!"); } 
            else if (cmd === '/money') {
                let amt = parseInt(args[1]) || 50000;
                score += amt;
                showGlobal("💰 Выдано: " + amt.toLocaleString());
            }
            else if (cmd === '/global') { showGlobal(args.slice(1).join(' ') || "Привет!"); }
            
            input.value = ""; 
            refresh();
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        // Спавн каждые 0.6 сек для плотности потока
        setInterval(spawn, 600);
        refresh();
    </script>
</body>
</html>
