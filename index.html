<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Tycoon Ultimate</title>
    <style>
        :root { --gold: #ffd700; --green: #00ff88; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        .screen.on { display: block; }

        #game-view.on { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #val { font-size: 50px; color: var(--gold); font-weight: bold; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        
        .clover { position: absolute; font-size: 45px; cursor: pointer; z-index: 5; user-select: none; transition: transform 0.1s; }
        .clover:active { transform: scale(1.3); }

        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align:center; padding: 18px 5px; cursor: pointer; color: #666; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--gold); background: #1a1a1a; }

        /* Твоя иконка из картинки */
        .admin-icon {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            margin-right: 10px;
            border-radius: 50%;
            border: 2px solid black;
        }

        .lang-list { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .lang-list.show { display: grid; }
        .lang-item { background: #222; padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Всплывающее окно уведомлений -->
    <div id="global-msg" style="display:none; position:fixed; top:80px; left:50%; transform:translateX(-50%); background:gold; color:black; padding:15px 30px; border-radius:50px; font-weight:bold; z-index:2000; box-shadow:0 0 20px gold; text-align:center; min-width: 260px;">
        <div id="msg-content" style="display: flex; align-items: center; justify-content: center;"></div>
    </div>

    <!-- ЭКРАНЫ -->
    <div id="game-view" class="screen on">
        <div style="text-align:center;">
            <div id="val">0</div>
            <p style="color:#888; margin-top: 5px;">CLOVERS</p>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <h2 style="color:var(--green); text-align:center;">🛠 МАГАЗИН</h2>
        <div class="card">
            <b>🎭 Маска</b> <br><small>Защита от проверок</small>
            <button class="btn" style="margin-top:15px;" onclick="showGlobal('Предмет куплен!')">50,000 🍀</button>
        </div>
    </div>

    <div id="scr-set" class="screen">
        <h2 style="text-align:center; color:var(--gold);">⚙️ НАСТРОЙКИ</h2>
        <div class="card">
            <p style="margin-top:0; font-weight: bold;">Админ-команды:</p>
            <input type="text" id="find" class="input-box" placeholder="Введи /команду...">
            <button class="btn" onclick="applyCode()">ВЫПОЛНИТЬ</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="nav">
        <div class="nav-item active" onclick="tab('game-view', this)">🎮 ИГРА</div>
        <div class="nav-item" onclick="tab('scr-shop', this)">🛠 ШОП</div>
        <div class="nav-item" onclick="tab('scr-set', this)">⚙️ НАСТР.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;

        // Переменная с твоей картинкой
        const adminImgHtml = `<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8XhN4E0iEof3p67_rWb7q3948VjS62mH-vQ&s" class="admin-icon">`;

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById(id).classList.add('on');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function spawn() {
            if (!document.getElementById('game-view').classList.contains('on')) return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerText = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 60) + 30 + 'px';
            c.style.top = Math.random() * (window.innerHeight - 200) + 70 + 'px';
            c.onclick = function() {
                score += 100;
                refresh();
                this.remove();
            };
            document.getElementById('game-view').appendChild(c);
            setTimeout(() => { if(c) c.remove(); }, 2000);
        }

        // Функция показа уведомления с картинкой
        function showGlobal(text) {
            let el = document.getElementById('global-msg');
            let content = document.getElementById('msg-content');
            content.innerHTML = adminImgHtml + `<span>${text}</span>`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function applyCode() {
            let input = document.getElementById('find');
            let v = input.value.trim();
            if (!v.startsWith('/')) { alert("Используй /команда"); return; }
            
            let args = v.split(' ');
            let cmd = args[0].toLowerCase();

            if (cmd === '/6633') {
                score += 5000000;
                showGlobal("👑 АДМИН-РЕЖИМ ВКЛЮЧЕН");
            } 
            else if (cmd === '/money') {
                let amt = parseInt(args[1]) || 0;
                score += amt;
                showGlobal("💰 Добавлено: " + amt.toLocaleString());
            }
            else if (cmd === '/global') {
                showGlobal(args.slice(1).join(' ') || "Привет!");
            }
            else if (cmd === '/reset') {
                if(confirm("Сбросить весь прогресс?")) {
                    localStorage.clear();
                    location.reload();
                }
            }
            else if (cmd === '/top') {
                alert("🏆 ТОП-3:\n1. Mimi: " + score + "\n2. Boss: 25,000,000\n3. Noob: 500,000");
            }

            input.value = ""; 
            refresh();
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        setInterval(spawn, 1000);
        refresh();
    </script>
</body>
</html>
