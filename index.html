<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Game Fix</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Видимость экранов */
        .screen { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; padding: 20px; box-sizing: border-box; }
        .screen.on { display: block; }

        /* Игра */
        #game-view { background: radial-gradient(circle, #1a1a1a, #000); text-align: center; }
        #val { font-size: 50px; color: gold; margin-top: 20px; font-weight: bold; }
        .clover { position: absolute; font-size: 40px; cursor: pointer; user-select: none; z-index: 10; }

        /* Интерфейс */
        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid gold; background: #000; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: gold; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        /* Навигация */
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 20px; cursor: pointer; color: #666; font-weight: bold; }
        .nav-item.active { color: gold; background: #1a1a1a; }

        /* Подсказки */
        #hints { background: rgba(0,0,0,0.9); border: 1px solid gold; border-radius: 10px; display: none; margin-bottom: 10px; max-height: 150px; overflow-y: auto; }
        #hints div { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="global-msg" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); background:gold; color:black; padding:10px 20px; border-radius:20px; font-weight:bold; z-index:2000; display:none;"></div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-view" class="screen on">
        <div id="val">0</div>
        <p>Собирай клеверы!</p>
    </div>

    <!-- ЭКРАН МАГАЗИНА -->
    <div id="scr-shop" class="screen">
        <h2>🛠 Магазин</h2>
        <div class="card">
            <p>Улучшение клика</p>
            <button class="btn" onclick="alert('Скоро!')">1,000 🍀</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="scr-set" class="screen">
        <div class="card">
            <h3 style="color:gold">⚙️ Админ-панель</h3>
            <div id="hints"></div>
            <input type="text" id="find" oninput="showHints(this.value)" placeholder="Введите / для команд...">
            <button class="btn" onclick="applyCode()">ВЫПОЛНИТЬ</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="nav">
        <div class="nav-item active" onclick="tab('game-view', this)">🎮 ИГРА</div>
        <div class="nav-item" onclick="tab('scr-shop', this)">🛠 ШОП</div>
        <div class="nav-item" onclick="tab('scr-set', this)">⚙️ НАСТР.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;
        const gameView = document.getElementById('game-view');
        const valDisplay = document.getElementById('val');

        // Список команд
        const commands = [
            { c: '/give money me ', d: 'Дать себе денег' },
            { c: '/random give ', d: 'Раздача (кол-во сумма)' },
            { c: '/bonus', d: 'Бонус 5000' },
            { c: '/clear me', d: 'Обнулить счет' }
        ];

        // Переключение вкладок
        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
            document.getElementById(id).classList.add('on');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // Спавн клеверов (только если открыта игра)
        function spawn() {
            if (!gameView.classList.contains('on')) return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerText = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 60) + 30 + 'px';
            c.style.top = Math.random() * (window.innerHeight - 150) + 50 + 'px';
            
            c.onclick = () => {
                score += 100;
                updateUI();
                c.remove();
            };
            gameView.appendChild(c);
            setTimeout(() => { if(c) c.remove(); }, 2000);
        }

        // Подсказки
        function showHints(v) {
            const h = document.getElementById('hints');
            if (v.startsWith('/')) {
                h.style.display = 'block';
                h.innerHTML = commands.map(i => `<div onclick="setCmd('${i.c}')"><b>${i.c}</b><br>${i.d}</div>`).join('');
            } else { h.style.display = 'none'; }
        }

        function setCmd(c) {
            document.getElementById('find').value = c;
            document.getElementById('hints').style.display = 'none';
        }

        // Выполнение команд
        function applyCode() {
            const input = document.getElementById('find');
            const v = input.value;
            const a = v.split(' ');

            if (v.includes('/give money me')) {
                score += parseInt(a[3]) || 0;
                msg("💰 Деньги зачислены!");
            } else if (v.includes('/random give')) {
                msg(`🎲 Раздача на ${a[2]} чел. по ${a[3]} 🍀`);
            } else if (v.includes('/bonus')) {
                score += 5000; msg("🎁 Бонус +5000!");
            } else if (v.includes('/clear me')) {
                score = 0; msg("🗑 Очищено");
            }
            
            input.value = '';
            updateUI();
        }

        function updateUI() {
            valDisplay.innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        function msg(t) {
            const m = document.getElementById('global-msg');
            m.innerText = t; m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 3000);
        }

        setInterval(spawn, 1000);
        updateUI();
    </script>
</body>
</html>
