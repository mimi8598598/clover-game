<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Quest</title>
    <style>
        :root { --gold: #ffd700; --green: #2ecc71; }
        body { margin: 0; background: radial-gradient(circle, #0a1a0a, #000); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* Фон и интерфейс */
        #game-box { width: 100vw; height: 100vh; position: relative; }
        #top-ui { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        #score-container { display: inline-block; pointer-events: auto; cursor: pointer; }
        #balance { font-size: 42px; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px gold; }
        
        /* Клеверы */
        .clover { position: absolute; font-size: 45px; cursor: pointer; user-select: none; z-index: 5; transition: transform 0.1s; }
        .gold { filter: drop-shadow(0 0 15px gold); animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Админка (РУ) */
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: rgba(17,17,17,0.95); border: 2px solid var(--gold); border-radius: 25px; padding: 20px; z-index: 1000; box-shadow: 0 0 50px #000; backdrop-filter: blur(10px); }
        .adm-btn { width: 100%; margin: 8px 0; padding: 14px; background: #222; border: 1px solid #444; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .adm-btn:active { background: var(--gold); color: black; }

        /* Уведомления */
        #notice { position: fixed; bottom: 50px; width: 100%; text-align: center; color: var(--gold); font-weight: bold; font-size: 18px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="top-ui">
        <div id="score-container" onclick="handleAdminEntry()">
            <span id="balance">🍀 0</span>
            <div style="font-size: 12px; color: #555; margin-top: 5px;">Нажми 5 раз для админки</div>
        </div>
    </div>
    <div id="notice"></div>
</div>

<div id="admin-panel">
    <h3 style="text-align:center; color:var(--gold); margin:0 0 15px 0; letter-spacing: 2px;">ПУЛЬТ УПРАВЛЕНИЯ</h3>
    <button class="adm-btn" onclick="adminCmd('money')">💰 ВЫДАТЬ СЕБЕ ДЕНЬГИ</button>
    <button class="adm-btn" onclick="adminCmd('luck')">🍀 УДАЧА x2 (35% ШАНС)</button>
    <button class="adm-btn" onclick="adminCmd('ghost')">👻 РЕЖИМ ПРИЗРАКА</button>
    <button class="adm-btn" onclick="adminCmd('say')">📢 ОБЪЯВЛЕНИЕ ВСЕМ</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; margin-top:15px; background:#c0392b; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold;">ЗАКРЫТЬ</button>
</div>

<script>
    let balance = parseInt(localStorage.getItem('clover_bal')) || 0;
    let timeInGame = 0;
    let isLuckX2 = false;
    let clickCount = 0;

    // --- ЛОГИКА ИГРЫ ---
    function createClover() {
        const clover = document.createElement('div');
        // Шансы по твоим правилам (35% если удача и 15 мин в игре)
        const chance = Math.random() * 100;
        const isGold = isLuckX2 ? (chance < 35) : (timeInGame > 30 && chance < 15);

        clover.className = 'clover' + (isGold ? ' gold' : '');
        clover.innerHTML = isGold ? '🌟' : '🍀';
        clover.style.left = Math.random() * (window.innerWidth - 60) + 'px';
        clover.style.top = '-60px';
        document.getElementById('game-box').appendChild(clover);

        let speed = Math.random() * 2 + 2;
        let pos = -60;

        let fall = setInterval(() => {
            pos += speed;
            clover.style.top = pos + 'px';
            if (pos > window.innerHeight) {
                clearInterval(fall);
                clover.remove();
            }
        }, 16);

        clover.onclick = () => {
            clearInterval(fall);
            balance += isGold ? 1000 : 10;
            updateDisplay();
            clover.style.transform = 'scale(1.5)';
            setTimeout(() => clover.remove(), 100);
        };
    }

    // Спавн клеверов
    setInterval(createClover, 900);
    setInterval(() => { timeInGame++; }, 60000);

    // --- АДМИНКА (5757) ---
    function handleAdminEntry() {
        clickCount++;
        if (clickCount >= 5) {
            if (prompt("Введите секретный код:") === "5757") {
                document.getElementById('admin-panel').style.display = 'block';
            }
            clickCount = 0;
        }
    }

    function adminCmd(type) {
        if (type === 'money') {
            balance += parseInt(prompt("Сколько начислить?") || 0);
        }
        if (type === 'luck') {
            isLuckX2 = true;
            document.getElementById('notice').innerText = "🍀 УДАЧА X2 АКТИВИРОВАНА!";
            setTimeout(() => { isLuckX2 = false; document.getElementById('notice').innerText = ""; }, 300000);
        }
        if (type === 'say') {
            let txt = prompt("Введите текст объявления:");
            document.getElementById('notice').innerText = "📢 " + txt;
            setTimeout(() => document.getElementById('notice').innerText = "", 5000);
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('balance').innerText = '🍀 ' + balance.toLocaleString();
        localStorage.setItem('clover_bal', balance);
    }

    updateDisplay();
</script>
</body>
</html>
