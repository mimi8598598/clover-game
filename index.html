<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Game x2</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0a200a, #000); z-index: -1; }
        
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #score-box { display: inline-block; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 40px; border: 2px solid gold; cursor: pointer; }
        #balance { font-size: 38px; color: gold; font-weight: bold; text-shadow: 0 0 10px gold; }

        .clover { position: absolute; font-size: 45px; cursor: pointer; user-select: none; z-index: 10; }
        .gold { filter: drop-shadow(0 0 15px gold); animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #111; border: 2px solid gold; border-radius: 20px; padding: 20px; z-index: 1000; box-shadow: 0 0 50px #000; }
        .adm-btn { width: 100%; margin: 5px 0; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="ui">
    <div id="score-box" onclick="adminCheck()">
        <span id="balance">🍀 0</span>
        <div style="font-size: 10px; color: #555;">ADMIN: 5757</div>
    </div>
</div>

<div id="admin-panel">
    <h3 style="text-align:center; color:gold; margin:0 0 10px 0;">ПУЛЬТ 5757</h3>
    <button class="adm-btn" onclick="addMoney()">💰 ВЫДАТЬ +1,000,000</button>
    <button class="adm-btn" onclick="activateLuck()">🍀 ШАНС 35% (LUCK)</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; margin-top:10px; background:red; color:white; border:none; padding:10px; border-radius:10px;">ЗАКРЫТЬ</button>
</div>

<script>
    let bal = parseInt(localStorage.getItem('clover_bal')) || 0;
    let isLuck = false;
    let clicks = 0;

    function spawnClover() {
        const c = document.createElement('div');
        const chance = Math.random() * 100;
        // Золотой клевер (🌟) выпадает с шансом 35% если включена удача, иначе 5%
        const isGold = isLuck ? (chance < 35) : (chance < 5);

        c.className = 'clover' + (isGold ? ' gold' : '');
        c.innerHTML = isGold ? '🌟' : '🍀';
        c.style.left = Math.random() * (window.innerWidth - 60) + 'px';
        c.style.top = '-60px';
        document.body.appendChild(c);

        let speed = Math.random() * 2 + 3;
        let pos = -60;

        let fall = setInterval(() => {
            pos += speed;
            c.style.top = pos + 'px';
            if (pos > window.innerHeight) { clearInterval(fall); c.remove(); }
        }, 16);

        c.onclick = () => {
            clearInterval(fall);
            // ТВОЕ ТРЕБОВАНИЕ: +2 за обычный клик
            bal += isGold ? 100 : 2; 
            updateUI();
            c.remove();
        };
    }

    function adminCheck() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("PASSWORD:") === "5757") document.getElementById('admin-panel').style.display='block';
            clicks = 0;
        }
    }

    function addMoney() { bal += 1000000; updateUI(); }
    function activateLuck() { isLuck = true; alert("ШАНС 35% ВКЛЮЧЕН!"); }
    function updateUI() { 
        document.getElementById('balance').innerText = '🍀 ' + bal.toLocaleString(); 
        localStorage.setItem('clover_bal', bal);
    }

    // ТВОЕ ТРЕБОВАНИЕ: Падают сразу 2 клевера
    setInterval(() => {
        spawnClover();
        spawnClover();
    }, 1000); // Каждую секунду падает пара

    updateUI();
</script>
</body>
</html>
