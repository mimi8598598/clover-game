<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Quest OS</title>
    <style>
        :root { --gold: #ffd700; --bg: #050a05; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Игра */
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .clover { position: absolute; font-size: 40px; cursor: pointer; z-index: 5; }

        /* Шапка */
        #header { position: fixed; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #bal-box { display: inline-block; pointer-events: auto; background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--gold); cursor: pointer; }
        #bal-val { font-size: 28px; color: var(--gold); font-weight: bold; }

        /* Окна */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 70px); background: #000; z-index: 200; padding: 20px; box-sizing: border-box; }
        .active { display: block; }
        h2 { color: var(--gold); text-align: center; }

        /* Поиск / Консоль в Настройках */
        .console-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #0f0; border-radius: 10px; font-family: monospace; margin-bottom: 10px; }
        .card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }

        /* Навигация */
        #nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; display: flex; z-index: 300; border-top: 1px solid #222; }
        .nav-btn { flex: 1; text-align: center; padding-top: 15px; color: #555; cursor: pointer; font-size: 12px; }
        .nav-btn.on { color: var(--gold); }

        /* Пульт 5757 */
        #admin { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #111; border: 2px solid var(--gold); padding: 20px; border-radius: 20px; z-index: 1000; }
        .adm-btn { width: 100%; padding: 12px; margin: 5px 0; background: #222; color: white; border: 1px solid #444; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div id="bal-box" onclick="tryAdm()">🍀 <span id="bal-txt">0</span></div>
    </div>

    <div id="game-view" class="screen active"></div>

    <div id="scr-bank" class="screen">
        <h2>БАНК</h2>
        <div class="card" style="text-align:center;">
            <p>Баланс счета:</p>
            <h1 style="color:var(--gold);">🍀 <span class="sync">0</span></h1>
        </div>
    </div>

    <div id="scr-tasks" class="screen">
        <h2>ЗАДАНИЯ</h2>
        <div class="card">Подписаться на канал <button onclick="add(5000)" style="float:right;">+5k</button></div>
    </div>

    <div id="scr-set" class="screen">
        <h2>НАСТРОЙКИ / ПОИСК</h2>
        <input type="text" id="cmd-input" class="console-input" placeholder="Введите команду (например: give 1000)">
        <button onclick="runCmd()" class="adm-btn" style="background:var(--gold); color:black;">ВЫПОЛНИТЬ</button>
        <div class="card" style="margin-top:20px; font-size: 12px; color: #666;">
            Доступные команды:<br>
            • give [число] — выдать монеты<br>
            • luck — включить удачу<br>
            • rain — клеверный дождь
        </div>
    </div>

    <div id="admin">
        <h3 style="text-align:center; color:gold;">АДМИН 5757</h3>
        <button class="adm-btn" onclick="add(1000000)">💰 +1,000,000</button>
        <button class="adm-btn" onclick="luckOn()">🍀 УДАЧА 35%</button>
        <button class="adm-btn" style="background:red;" onclick="document.getElementById('admin').style.display='none'">ЗАКРЫТЬ</button>
    </div>

    <div id="nav">
        <div class="nav-btn on" onclick="nav('game-view', this)">🎮<br>Игра</div>
        <div class="nav-btn" onclick="nav('scr-bank', this)">🏦<br>Банк</div>
        <div class="nav-btn" onclick="nav('scr-tasks', this)">📋<br>Задания</div>
        <div class="nav-btn" onclick="nav('scr-set', this)">⚙️<br>Настройки</div>
    </div>

    <script>
        let bal = parseInt(localStorage.getItem('clover_bal')) || 0;
        let isLuck = false;
        let admC = 0;

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            el.classList.add('on');
        }

        // РАБОТА С КОМАНДАМИ (ПОИСК)
        function runCmd() {
            let input = document.getElementById('cmd-input').value.split(' ');
            let cmd = input[0].toLowerCase();
            let val = parseInt(input[1]);

            if (cmd === 'give' && val) {
                add(val);
                alert('Выдано ' + val + ' клеверов');
            } else if (cmd === 'luck') {
                luckOn();
            } else if (cmd === 'rain') {
                for(let i=0; i<30; i++) setTimeout(spawn, i*100);
                alert('Клеверный дождь!');
            } else {
                alert('Команда не найдена');
            }
            document.getElementById('cmd-input').value = '';
        }

        function spawn() {
            if (!document.getElementById('game-view').classList.contains('active')) return;
            const c = document.createElement('div');
            const gold = isLuck ? (Math.random() < 0.35) : (Math.random() < 0.05);
            c.className = 'clover';
            c.innerHTML = gold ? '🌟' : '🍀';
            c.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            c.style.top = '-50px';
            document.getElementById('game-view').appendChild(c);

            let pos = -50;
            let fall = setInterval(() => {
                pos += 2;
                c.style.top = pos + 'px';
                if (pos > window.innerHeight) { clearInterval(fall); c.remove(); }
            }, 16);

            c.onclick = () => { clearInterval(fall); bal += gold ? 100 : 2; update(); c.remove(); };
        }

        function tryAdm() {
            admC++;
            if(admC >= 5) {
                if(prompt("PASSWORD:") === "5757") document.getElementById('admin').style.display='block';
                admC = 0;
            }
        }

        function add(n) { bal += n; update(); }
        function luckOn() { isLuck = true; alert("УДАЧА ВКЛЮЧЕНА!"); }
        function update() {
            document.getElementById('bal-txt').innerText = bal.toLocaleString();
            document.querySelectorAll('.sync').forEach(s => s.innerText = bal.toLocaleString());
            localStorage.setItem('clover_bal', bal);
        }

        setInterval(() => { spawn(); spawn(); }, 1500);
        update();
    </script>
</body>
</html>
