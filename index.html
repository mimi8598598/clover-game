<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Master: Chaos & Speed</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000;
            color: white; font-family: 'Arial Black', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transition: background 1s ease;
        }

        #ui {
            position: absolute; top: 10px; text-align: center; width: 100%;
            z-index: 10; pointer-events: none;
        }

        #level-display { font-size: 28px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        #goal-display { font-size: 16px; color: #ffd700; margin-top: 5px; text-transform: uppercase; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 10px; }
        #info-bar { display: flex; gap: 15px; margin-top: 5px; justify-content: center; }
        .stat { font-size: 12px; font-family: sans-serif; font-weight: bold; }
        
        .clover {
            position: absolute; font-size: 55px; cursor: pointer;
            user-select: none; will-change: transform;
            filter: drop-shadow(0 0 10px rgba(0,255,0,0.5));
        }

        @keyframes catch {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="level-display">УРОВЕНЬ 1 / 250</div>
        <div id="goal-display">Осталось собрать: <span id="needed">20</span></div>
        <div id="info-bar">
            <div class="stat" style="color: #ff4444;">СКОРОСТЬ: <span id="speed-val">1.00</span>x</div>
            <div class="stat" style="color: #44ff44;">ЦЕЛЬ УРОВНЯ: <span id="target-val">20</span></div>
        </div>
    </div>

    <script>
        let level = 1;
        let caughtInLevel = 0;
        const maxLevel = 250;

        let baseSpeed = 4.0; 
        let speedMultiplier = 1.0; 

        function calculateBaseNeeded(lvl) {
            if (lvl <= 100) return 19 + lvl; 
            return 45 + Math.floor((lvl - 100) * 0.2); 
        }

        function getFinalNeeded(lvl) {
            const base = calculateBaseNeeded(lvl);
            const variation = (Math.random() * 0.16) - 0.08;
            const final = Math.round(base * (1 + variation));
            return Math.max(final, 5);
        }

        let totalNeeded = getFinalNeeded(level);

        const levelEl = document.getElementById('level-display');
        const neededEl = document.getElementById('needed');
        const speedValEl = document.getElementById('speed-val');
        const targetValEl = document.getElementById('target-val');

        function updateUI() {
            const hue = (level * 15) % 360; 
            document.body.style.background = `hsl(${hue}, 40%, 15%)`;
            
            levelEl.innerText = `УРОВЕНЬ ${level} / ${maxLevel}`;
            neededEl.innerText = Math.max(0, totalNeeded - caughtInLevel);
            speedValEl.innerText = speedMultiplier.toFixed(2);
            targetValEl.innerText = totalNeeded;
        }

        function createClover() {
            if (caughtInLevel >= totalNeeded) return;

            const clover = document.createElement('div');
            clover.className = 'clover';
            clover.innerText = '🍀';
            clover.style.left = Math.random() * (window.innerWidth - 70) + 'px';
            clover.style.top = '-80px';
            document.body.appendChild(clover);

            let posY = -80;
            let currentCloverSpeed = baseSpeed + (Math.random() * 1.5);

            const fall = setInterval(() => {
                posY += currentCloverSpeed;
                clover.style.top = posY + 'px';
                if (posY > window.innerHeight) {
                    clearInterval(fall);
                    clover.remove();
                }
            }, 16);

            clover.onclick = () => {
                clearInterval(fall);
                caughtInLevel++;
                updateUI();
                clover.style.animation = 'catch 0.2s forwards';
                setTimeout(() => clover.remove(), 200);

                if (caughtInLevel >= totalNeeded) {
                    if (level < maxLevel) nextLevel();
                    else alert("ПОБЕДА!");
                }
            };
        }

        function nextLevel() {
            level++;
            caughtInLevel = 0;
            const speedIncrease = 0.05 + (Math.random() * 0.10);
            baseSpeed *= (1 + speedIncrease);
            speedMultiplier *= (1 + speedIncrease);
            totalNeeded = getFinalNeeded(level);

            updateUI();
            document.body.style.filter = "brightness(2)";
            setTimeout(() => document.body.style.filter = "brightness(1)", 200);
        }

        setInterval(() => {
            if (caughtInLevel < totalNeeded) {
                const count = level > 100 ? 4 : 3;
                for (let i = 0; i < count; i++) {
                    setTimeout(createClover, i * (200 + Math.random() * 100)); 
                }
            }
        }, 2200 - Math.min(level * 5, 1200));

        updateUI();
    </script>
</body>
</html>
