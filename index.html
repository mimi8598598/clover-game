<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Heist: Ultimate Edition</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4444; --green: #00ff88; --bg: #0a0a0a; --panel: #161616; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle, #1a2a1a, #000); }
        .clover { position: absolute; font-size: 40px; cursor: pointer; z-index: 5; }
        
        #top { position: fixed; top: 15px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #bal-display { display: inline-block; padding: 10px 25px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); border-radius: 15px; color: var(--gold); font-size: 24px; font-weight: 900; pointer-events: auto; }

        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 80px); background: var(--bg); z-index: 200; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }

        /* МИНИ-ИГРА ВЗЛОМА */
        #safe-game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
        .lock-container { width: 220px; height: 220px; border: 8px solid #333; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .lock-target { position: absolute; width: 45px; height: 45px; background: var(--green); border-radius: 50%; opacity: 0.5; }
        .lock-indicator { position: absolute; width: 6px; height: 100px; background: white; transform-origin: bottom center; bottom: 50%; border-radius: 5px; }

        /* СПИСОК КОНТРАКТОВ */
        .heist-item { background: #1f1f1f; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--gold); position: relative; cursor: pointer; }
        .cooldown { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; color:var(--red); font-size:24px; font-weight:bold; border-radius:12px; }

        /* НАСТРОЙКИ И ЯЗЫКИ */
        .lang-select { background: #222; color: var(--gold); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid #333; cursor: pointer; }
        .lang-list { display: none; background: #111; border: 1px solid #333; border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; }
        .lang-list div { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        .show { display: block; }

        /* НАВИГАЦИЯ */
        #nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; z-index: 300; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; padding-top: 18px; color: #555; cursor: pointer; }
        .nav-item.on { color: var(--gold); }
        .nav-item b { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="top"><div id="bal-display">🍀 <span id="val">0</span></div></div>

    <!-- МИНИ-ИГРА -->
    <div id="safe-game" onclick="checkLock()">
        <h2 id="safe-title" style="color:white; margin:0 0 10px 0;">ВЗЛОМ...</h2>
        <div class="lock-container">
            <div class="lock-target" id="target"></div>
            <div class="lock-indicator" id="indicator"></div>
        </div>
        <div id="lock-dots" style="margin-top:20px; font-size:20px;">⚪ ⚪ ⚪</div>
    </div>

    <!-- ЭКРАНЫ -->
    <div id="game-view" class="screen active"></div>

    <div id="scr-heist" class="screen">
        <h2 style="color:var(--red); text-align:center;">🚨 КОНТРАКТЫ</h2>
        <div class="heist-item" onclick="openSafeGame(0)">
            <div class="cooldown" id="cd-0"></div>
            <b>🏪 Магазин</b><br><small>Легко | +10,000</small>
        </div>
        <div class="heist-item" onclick="openSafeGame(1)">
            <div class="cooldown" id="cd-1"></div>
            <b>💎 Ювелирка</b><br><small>Средне | +80,000</small>
        </div>
        <div class="heist-item" onclick="openSafeGame(2)">
            <div class="cooldown" id="cd-2"></div>
            <b>🏢 Банк</b><br><small>СЛОЖНО | +500,000</small>
        </div>
    </div>

    <div id="scr-shop" class="screen">
        <h2 style="color:var(--green); text-align:center;">🛠 МАГАЗИН</h2>
        <div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <div><b>Маска</b><br><small style="color:#888">-20% к штрафу</small></div>
            <button onclick="buy(50000, 'mask', this)" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">50K</button>
        </div>
    </div>

    <div id="scr-set" class="screen">
        <h2 style="color:var(--gold); text-align:center;">⚙️ НАСТРОЙКИ</h2>
        <input type="text" id="find" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:lime; border-radius:10px; margin-bottom:15px;" placeholder="Код...">
        <button onclick="applyCode()" style="width:100%; background:#222; color:white; border:none; padding:10px; border-radius:10px; margin-bottom:20px;">АКТИВИРОВАТЬ</button>
        
        <div class="lang-select" onclick="document.getElementById('lang-list').classList.toggle('show')">
            <span id="cur-lang">РУССКИЙ</span><span>▼</span>
        </div>
        <div class="lang-list" id="lang-list">
            <div onclick="setL('РУССКИЙ')">РУССКИЙ</div>
            <div onclick="setL('ENGLISH')">ENGLISH</div>
            <div onclick="setL('POLSKI')">POLSKI</div>
            <div onclick="setL('DEUTSCH')">DEUTSCH</div>
            <div onclick="setL('FRANÇAIS')">FRANÇAIS</div>
            <!-- Можно добавить остальные по аналогии -->
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div id="nav">
        <div class="nav-item on" onclick="tab('game-view', this)"><b>🎮</b>Игра</div>
        <div class="nav-item" onclick="tab('scr-heist', this)"><b>🚨</b>Дело</div>
        <div class="nav-item" onclick="tab('scr-shop', this)"><b>🛠</b>Шоп</div>
        <div class="nav-item" onclick="tab('scr-set', this)"><b>⚙️</b>Настр.</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('cl_score')) || 0;
        let hasMask = false;
        let gameActive = false, successes = 0, angle = 0, targetAngle = 0, currentH = 0;
        let configs = [
            {w:10000, l:5000, s:3, sz:60, cd:10},
            {w:80000, l:40000, s:5, sz:40, cd:30},
            {w:500000, l:250000, s:8, sz:25, cd:60}
        ];

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            el.classList.add('on');
        }

        function openSafeGame(idx) {
            if(document.getElementById('cd-'+idx).style.display === 'flex') return;
            currentH = idx; successes = 0; angle = 0; gameActive = true;
            document.getElementById('safe-game').style.display = 'flex';
            document.getElementById('lock-dots').innerText = "⚪ ⚪ ⚪";
            setTarget(); requestAnimationFrame(update);
        }

        function setTarget() {
            targetAngle = Math.random() * 300 + 30;
            document.getElementById('target').style.transform = `rotate(${targetAngle}deg) translateY(-85px)`;
            document.getElementById('target').style.width = configs[currentH].sz + 'px';
        }

        function update() {
            if(!gameActive) return;
            angle += configs[currentH].s + (successes * 1.5);
            if(angle >= 360) angle = 0;
            document.getElementById('indicator').style.transform = `rotate(${angle}deg)`;
            requestAnimationFrame(update);
        }

        function checkLock() {
            if(!gameActive) return;
            let diff = Math.abs(angle - targetAngle);
            if(diff < configs[currentH].sz / 2) {
                successes++;
                document.getElementById('lock-dots').innerText = "🟢 ".repeat(successes) + "⚪ ".repeat(3-successes);
                if(successes >= 3) finish(true); else setTarget();
            } else finish(false);
        }

        function finish(win) {
            gameActive = false; let c = configs[currentH];
            const title = document.getElementById('safe-title');
            if(win) { score += c.w; title.innerText = "УСПЕХ!"; title.style.color = "var(--green)"; }
            else { 
                let loss = hasMask ? c.l * 0.7 : c.l;
                score = Math.max(0, score - loss); 
                title.innerText = "ПОЛИЦИЯ!"; title.style.color = "var(--red)"; 
            }
            refresh();
            setTimeout(() => {
                document.getElementById('safe-game').style.display = 'none';
                title.style.color = "white"; title.innerText = "ВЗЛОМ...";
                startCD(currentH, c.cd);
            }, 1200);
        }

        function startCD(i, s) {
            const el = document.getElementById('cd-'+i); el.style.display = 'flex';
            let t = s; el.innerText = t;
            let it = setInterval(() => { t--; el.innerText = t; if(t<=0){ clearInterval(it); el.style.display='none'; }}, 1000);
        }

        function buy(p, item, btn) {
            if(score >= p) { score -= p; hasMask = true; btn.innerText = "ЕСТЬ"; btn.disabled = true; refresh(); }
        }

        function applyCode() {
            let v = document.getElementById('find').value;
            if(v.includes('give')) score += 100000;
            document.getElementById('find').value = ""; refresh();
        }

        function setL(n) { document.getElementById('cur-lang').innerText = n; document.getElementById('lang-list').classList.remove('show'); }

        function spawn() {
            if(!document.getElementById('game-view').classList.contains('active')) return;
            const c = document.createElement('div');
            c.className = 'clover'; c.innerHTML = '🍀';
            c.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            c.style.top = '-50px';
            document.getElementById('game-view').appendChild(c);
            let y = -50;
            let f = setInterval(() => {
                y += 2.5; c.style.top = y + 'px';
                if(y > window.innerHeight){ clearInterval(f); c.remove(); }
            }, 16);
            c.onclick = () => { score += 5; refresh(); c.remove(); };
        }

        function refresh() {
            document.getElementById('val').innerText = score.toLocaleString();
            localStorage.setItem('cl_score', score);
        }

        setInterval(spawn, 1000); refresh();
    </script>
</body>
</html>
