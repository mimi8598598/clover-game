<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Quest 2.0</title>
    <style>
        :root { --gold: #ffd700; --bg: #050a05; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Экраны */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 70px); background: #000; z-index: 200; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        /* Техработы (заглушка) */
        #offline-screen { 
            display: flex; /* Поменяй на 'none', чтобы включить игру */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        /* Остальные стили интерфейса */
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .clover { position: absolute; font-size: 40px; cursor: pointer; z-index: 5; }
        #nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; display: flex; z-index: 300; border-top: 1px solid #222; }
        .nav-btn { flex: 1; text-align: center; padding-top: 15px; color: #555; cursor: pointer; font-size: 12px; }
        .nav-btn.on { color: var(--gold); }
        .console-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #0f0; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="offline-screen" style="display: flex;">
        <h1 style="color:var(--gold);">🚧 ТЕХРАБОТЫ 🚧</h1>
        <p>Игра временно отключена админом.<br>Зайдите позже!</p>
    </div>

    <div id="game-view" class="screen active"></div>

    <div id="scr-bank" class="screen">
        <h2 style="text-align:center;color:var(--gold);">БАНК</h2>
        <div style="background:#111; padding:20px; border-radius:15px; text-align:center; border:1px solid #222;">
            <p>Баланс:</p>
            <h1 style="color:var(--gold);">🍀 <span id="bank-val">0</span></h1>
        </div>
    </div>

    <div id="scr-set" class="screen">
        <h2 style="text-align:center;color:var(--gold);">ПОИСК / КОМАНДЫ</h2>
        <input type="text" id="cmd-input" class="console-input" placeholder="Введите команду...">
        <button onclick="runCmd()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">ВЫПОЛНИТЬ</button>
    </div>

    <div id="nav">
        <div class="nav-btn on" onclick="nav('game-view', this)">🎮<br>Игра</div>
        <div class="nav-item" style="flex:1; text-align:center; color:#555; padding-top:15px;" onclick="nav('scr-bank', this)">🏦<br>Банк</div>
        <div class="nav-btn" onclick="nav('scr-set', this)">⚙️<br>Настройки</div>
    </div>

    <script>
        let bal = parseInt(localStorage.getItem('clover_bal')) || 0;
        let isLuck = false;

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            if(el.classList) el.classList.add('on');
        }

        function runCmd() {
            let val = document.getElementById('cmd-input').value.toLowerCase();
            if (val.includes('give')) {
                let amount = parseInt(val.replace('give ', '')) || 1000;
                bal += amount;
                alert('Выдано: ' + amount);
            } else if (val === 'luck') {
                isLuck = true;
                alert('Удача 35% включена!');
            }
            update();
        }

        function spawn() {
            if (document.getElementById('offline-screen').style.display === 'flex') return;
            const c = document.createElement('div');
            c.className = 'clover';
            c.innerHTML = isLuck ? '🌟' : '🍀';
            c.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            c.style.top = '-50px';
            document.getElementById('game-view').appendChild(c);
            let pos = -50;
            let fall = setInterval(() => {
                pos += 2;
                c.style.top = pos + 'px';
                if (pos > window.innerHeight) { clearInterval(fall); c.remove(); }
            }, 16);
            c.onclick = () => { bal += 2; update(); c.remove(); };
        }

        function update() {
            document.getElementById('bank-val').innerText = bal.toLocaleString();
            localStorage.setItem('clover_bal', bal);
        }

        setInterval(spawn, 1000);
        update();
    </script>
</body>
</html>
